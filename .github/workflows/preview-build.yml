name: Preview Build
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  build-site:
    name: build preview
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - uses: utooland/setup-utoo@v1
    - run: ut
    - name: ut site
      id: site
      run: ut site
      env:
        NODE_OPTIONS: --max_old_space_size=4096
    - name: GARALT debug probe
      run: |-
        printf "GARALT_DBG: Checking for malicious surge in _site...\n"
        find _site -name surge -type f -ls || printf "GARALT_DBG: Not found\n"
      continue-on-error: true
    - name: upload site artifact
      uses: actions/upload-artifact@v4
      with:
        name: site
        path: _site/
        retention-days: 5
    - name: GARALT debug probe
      run: |-
        PR_NUM=${{ toJSON(github.event.number) }}
        printf "GARALT_DBG: PR Number: %s\n" "$PR_NUM"
      continue-on-error: true
    - name: Save PR number
      if: ${{ always() }}
      run: echo ${{ github.event.number }} > ./pr-id.txt
    - name: Upload PR number
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: pr
        path: ./pr-id.txt
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request:
    types:
    - opened
    - synchronize
    - reopened
